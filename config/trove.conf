# Trove Configuration File
# Edit this file to customize Trove behavior

###############################################################################
# Logging Configuration
###############################################################################

# Log level filter (TRACE|DEBUG|INFO|WARN|ERROR|FATAL|NONE)
# Only messages at or above this level will be displayed
TROVE_LOG_LEVEL="INFO"

# Show command output in terminal (true|false)
# When false, command stdout is suppressed
TROVE_OUTPUT_DISPLAY="true"

###############################################################################
# Color Scheme
###############################################################################

# Color scheme for terminal output
# Available: monokai, solarized, nord, dracula, gruvbox
TROVE_COLORSCHEME="monokai"

###############################################################################
# Monitoring Configuration
###############################################################################

# Enable monitoring helpers (true|false)
TROVE_MONITORING_ENABLED="false"

# Monitoring system URL (for metric submission)
# Example: https://monitor.example.internal
TROVE_MONITORING_URL=""

###############################################################################
# Advanced Options
###############################################################################

# Enable experimental features (true|false)
TROVE_EXPERIMENTAL="false"

# Verbose mode for debugging (true|false)
TROVE_VERBOSE="false"
